spring.config.import=optional:file:.env[.properties]
spring.application.name=jobs-api
spring.profiles.active=dev

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExists=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET}
app.jwt.cookieName=${JWT_COOKIE_NAME:jwt}
app.jwt.expiryMs=${JWT_TOKEN_EXPIRY:86400000}

app.auth.username=${AUTH_USERNAME:admin}
app.auth.password=${AUTH_PASSWORD:admin12345}

app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}